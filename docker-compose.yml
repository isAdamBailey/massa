services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-massa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-massa}
      POSTGRES_DB: ${POSTGRES_DB:-massa}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-massa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://massa:massa@postgres:5432/massa?sslmode=disable}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      COOKIE_SIGNING_SECRET: ${COOKIE_SIGNING_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URL: ${GOOGLE_OAUTH_REDIRECT_URL:-http://localhost:8080/api/google/callback}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAGIC_LINK_FROM_EMAIL: ${MAGIC_LINK_FROM_EMAIL:-login@massa.local}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      SYNC_INTERVAL_HOURS: ${SYNC_INTERVAL_HOURS:-12}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080}
    depends_on:
      - backend

volumes:
  postgres_data:
