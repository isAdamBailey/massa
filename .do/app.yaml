# DigitalOcean App Platform spec for Massa.
# Docs: docs/DEPLOY_DIGITALOCEAN_APP_PLATFORM.md
#
# After connecting the repo, set SECRET env vars in the App Platform dashboard
# (values are not committed here).

name: massa
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

databases:
  - name: db
    engine: PG
    version: "16"
    production: true

services:
  - name: api
    github:
      repo: isAdamBailey/massa
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /healthz
      initial_delay_seconds: 20
      period_seconds: 10
    envs:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: APP_BASE_URL
        scope: RUN_TIME
        value: ${APP_URL}
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SIGNING_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ALLOWED_EMAILS
        scope: RUN_TIME
        type: SECRET
      - key: EMAIL_PROVIDER
        value: ses
      - key: SES_REGION
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_USERNAME
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: MAGIC_LINK_FROM_EMAIL
        scope: RUN_TIME
        type: SECRET

  - name: web
    github:
      repo: isAdamBailey/massa
      branch: main
      deploy_on_push: true
    source_dir: frontend
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: NUXT_PUBLIC_API_BASE
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: api
        preserve_path_prefix: true
    - match:
        path:
          prefix: /healthz
      component:
        name: api
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: web
